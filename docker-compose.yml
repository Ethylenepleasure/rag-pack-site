name: ragpack

services:
  app:
    build: .
    env_file:
      - path: backend/.env
        required: false
    expose:
      - "8080"
    volumes:
      - ragpack-data:/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.75

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - app
    env_file:
      - path: backend/.env
        required: false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  ragpack-data:
  caddy-data:
  caddy-config:
